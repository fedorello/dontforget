<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="DontForget — Smart reminders for medications, shopping and tasks">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="DontForget">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>
  <title>DontForget</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body {
      background-color: #FAFAF7;
      margin: 0;
      padding: 0;
    }
    #loading {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;
      gap: 16px;
      font-family: -apple-system, sans-serif;
      color: #6B7280;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #E8F5EE;
      border-top-color: #4CAF82;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <span>DontForget</span>
  </div>
  <script>
    window.addEventListener('flutter-first-frame', function () {
      document.getElementById('loading').remove();
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
